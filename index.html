<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MyTAG</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#C9682F">
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22MyTAG%22,%22short_name%22:%22MyTAG%22,%22display%22:%22standalone%22,%22theme_color%22:%22%23C9682F%22,%22background_color%22:%22%23ffffff%22}">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

:root{
  --tag:#C9682F; --tag-dk:#a8531f; --tag-lt:#fff3ec; --tag-bd:#f5d4bc;
  --bg:#f7f6f4; --white:#ffffff; --s2:#fbfaf9; --s3:#f1efec;
  --bd:#e6e2dc; --bd2:#d6d0c6;
  --tx:#241f1a; --txd:#5a5247; --txm:#9a9181;
  --green:#1a7a4a; --green-bg:#eaf7f0;
  --blue:#1e5fa8; --blue-bg:#eaf1fb;
  --gold:#9a6b1f; --gold-bg:#fff8ec;
  --navy:#1f2937;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);position:fixed;inset:0;overflow:hidden;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
img{display:block;max-width:100%;}
::-webkit-scrollbar{display:none;}

/* ===== LOGIN (full screen app-style) ===== */
#login-screen{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;}
.login-bg{position:absolute;inset:0;}
.login-bg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.8s ease;}
.login-bg img.show{opacity:1;}
.login-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,14,10,.25) 0%,rgba(20,14,10,.55) 55%,rgba(20,14,10,.96) 100%);}
.login-content{position:relative;z-index:2;padding:0 24px calc(28px + var(--safe-bottom));color:#fff;}
.login-wordmark{font-size:34px;font-weight:800;letter-spacing:-0.5px;}
.login-wordmark span{color:#f2a878;}
.login-tag{font-size:11.5px;letter-spacing:2.5px;color:rgba(255,255,255,.75);text-transform:uppercase;margin-top:6px;font-weight:600;}
.login-welcome{font-size:13.5px;color:rgba(255,255,255,.85);margin-top:18px;line-height:1.55;}
.field{text-align:left;margin-top:16px;}
.field label{font-size:10.5px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;}
.field input{width:100%;padding:14px 14px;border:none;border-radius:12px;font-family:inherit;font-size:16px;background:rgba(255,255,255,.95);}
.field input:focus{outline:2px solid var(--tag);}
.login-btn{width:100%;padding:15px;background:var(--tag);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:15px;margin-top:18px;}
.login-btn:active{background:var(--tag-dk);}
.login-error{color:#ffb4a8;font-size:12.5px;margin-top:10px;display:none;}
.login-demo{margin-top:16px;font-size:11.5px;color:rgba(255,255,255,.65);background:rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;line-height:1.6;}
.login-demo b{color:#fff;}
.login-dots{display:flex;gap:5px;justify-content:center;margin-top:18px;}
.login-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);}
.login-dot.active{background:#fff;}

/* ===== APP SHELL ===== */
#app{display:none;height:100%;flex-direction:column;}
#app.active{display:flex;}
.app-topbar{padding:calc(14px + var(--safe-top)) 18px 12px;background:var(--white);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.app-topbar h1{font-size:17px;font-weight:800;}
.app-avatar{width:32px;height:32px;border-radius:50%;background:var(--tag);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;}
#app-main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 18px;}
.page{display:none;}
.page.active{display:block;}

/* ===== BOTTOM TAB BAR ===== */
#tabbar{display:flex;background:var(--white);border-top:1px solid var(--bd);padding:8px 4px calc(8px + var(--safe-bottom));}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;border-radius:10px;color:var(--txm);}
.tab-item .ic{font-size:19px;}
.tab-item .lb{font-size:9.5px;font-weight:700;}
.tab-item.active{color:var(--tag-dk);}

/* ===== MORE MENU (overflow tabs) ===== */
#more-sheet{position:fixed;inset:0;z-index:200;display:none;}
#more-sheet.active{display:block;}
.sheet-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.4);}
.sheet-panel{position:absolute;left:0;right:0;bottom:0;background:var(--white);border-radius:18px 18px 0 0;padding:10px 16px calc(20px + var(--safe-bottom));}
.sheet-handle{width:36px;height:4px;background:var(--bd2);border-radius:99px;margin:6px auto 14px;}
.sheet-item{display:flex;align-items:center;gap:14px;padding:13px 6px;font-size:14.5px;font-weight:600;border-bottom:1px solid var(--bd);}
.sheet-item .ic{font-size:18px;width:24px;text-align:center;}

/* shared component styles */
.card{background:var(--white);border:1px solid var(--bd);border-radius:14px;padding:16px 16px;margin-bottom:12px;}
.section-title{font-size:14.5px;font-weight:800;margin-bottom:3px;}
.section-sub{font-size:12px;color:var(--txm);margin-bottom:12px;}
.pill{display:inline-block;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;}
.pill-orange{background:var(--tag-lt);color:var(--tag-dk);}
.pill-green{background:var(--green-bg);color:var(--green);}
.pill-blue{background:var(--blue-bg);color:var(--blue);}
.pill-gold{background:var(--gold-bg);color:var(--gold);}
.btn{padding:10px 14px;border-radius:10px;font-weight:700;font-size:13px;border:1.5px solid var(--bd2);background:var(--white);color:var(--txd);width:100%;text-align:center;}
.btn-primary{background:var(--tag);color:#fff;border-color:var(--tag);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
input,select{font-family:inherit;}
</style>
</head>

/* ---- login carousel ---- */
(function(){
  const bg = document.getElementById('login-bg');
  const dots = document.getElementById('login-dots');
  bg.innerHTML = LOGIN_IMAGES.map((src,i)=>`<img src="${src}" class="${i===0?'show':''}">`).join('');
  dots.innerHTML = LOGIN_IMAGES.map((_,i)=>`<div class="login-dot ${i===0?'active':''}"></div>`).join('');
  let i = 0;
  setInterval(()=>{
    const imgs = bg.querySelectorAll('img');
    const ds = dots.querySelectorAll('.login-dot');
    imgs[i].classList.remove('show'); ds[i].classList.remove('active');
    i = (i+1) % imgs.length;
    imgs[i].classList.add('show'); ds[i].classList.add('active');
  }, 4500);
})();

function doLogin(){
  const u = document.getElementById('login-user').value.trim().toLowerCase();
  const p = document.getElementById('login-pass').value;
  if(u==='kerryn collins' && p==='Tag01'){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('active');
  } else {
    document.getElementById('login-err').style.display='block';
  }
}
document.getElementById('login-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

function buildTabbar(){
  const tb = document.getElementById('tabbar');
  let html = TABS.map(t=>`<div class="tab-item" data-id="${t.id}" onclick="showPage('${t.id}')"><div class="ic">${t.ic}</div><div class="lb">${t.label}</div></div>`).join('');
  html += `<div class="tab-item" id="more-tab" onclick="openMore()"><div class="ic">☰</div><div class="lb">More</div></div>`;
  tb.innerHTML = html;
  document.getElementById('more-list').innerHTML = MORE_ITEMS.map(m=>`<div class="sheet-item" onclick="showPage('${m.id}');closeMore();"><span class="ic">${m.ic}</span>${m.label}</div>`).join('');
}
function openMore(){ document.getElementById('more-sheet').classList.add('active'); }
function closeMore(){ document.getElementById('more-sheet').classList.remove('active'); }

function showPage(id){
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.toggle('active', t.dataset.id===id));
  const isMore = MORE_ITEMS.some(m=>m.id===id);
  document.getElementById('more-tab').classList.toggle('active', isMore);
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active', p.id==='page-'+id));
  document.getElementById('page-title').textContent = ALL_PAGES[id];
  document.getElementById('app-main').scrollTop = 0;
}
buildTabbar();

/* ---- WIKI ---- */
let WIKI = [];
function flightTypeBadge(t){ return t==='direct' ? '<span class="pill pill-green">Direct</span>' : '<span class="pill pill-gold">1+ Stop</span>'; }
function destCard(d){
  return `<div class="card" style="display:flex;gap:12px;align-items:center;" onclick="openDest('${d.id}')">
    <div style="font-size:28px;">${d.img}</div>
    <div style="flex:1;"><div style="font-weight:700;font-size:14px;">${d.name}</div><div style="font-size:11px;color:var(--txm);">${d.region}</div></div>
    <div style="color:var(--tag-dk);font-size:18px;">›</div>
  </div>`;
}
function buildWiki(){
  return `<input id="wiki-search" oninput="filterWiki()" placeholder="Search destinations..." style="width:100%;padding:11px 14px;border:1.5px solid var(--bd2);border-radius:10px;font-size:14px;margin-bottom:12px;">
  <div id="wiki-list">${WIKI.map(destCard).join('')}</div>
  <div id="dest-detail"></div>`;
}
function filterWiki(){
  const q = document.getElementById('wiki-search').value.toLowerCase();
  document.getElementById('wiki-list').innerHTML = WIKI.filter(d=>d.name.toLowerCase().includes(q)||d.region.toLowerCase().includes(q)).map(destCard).join('');
}
function openDest(id){
  const d = WIKI.find(x=>x.id===id);
  const flightRows = d.flights.map(f=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bd);font-size:11.5px;"><div><b>${f.from}</b> → ${f.to}<div style="color:var(--txm);">${f.airline}</div></div><div style="text-align:right;">${f.time}<br>${flightTypeBadge(f.type)}</div></div>`).join('');
  const whyLis = d.why.map(w=>`<li style="margin-bottom:5px;">${w}</li>`).join('');
  const docLis = d.visa.docs.map(w=>`<li style="margin-bottom:3px;">${w}</li>`).join('');
  const prac = d.practical;
  document.getElementById('dest-detail').innerHTML = `
  <div class="card" style="margin-top:14px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div><div style="font-size:30px;">${d.img}</div><div style="font-size:17px;font-weight:800;margin-top:4px;">${d.name}</div><div style="font-size:11.5px;color:var(--txm);">${d.region}</div></div>
      <button class="btn" style="width:auto;padding:7px 11px;" onclick="document.getElementById('dest-detail').innerHTML=''">✕</button>
    </div>
    <p style="margin-top:10px;font-size:12.5px;line-height:1.55;color:var(--txd);">${d.overview}</p>
    <div style="margin-top:16px;font-weight:800;font-size:13px;">⭐ Why Sell This</div>
    <ul style="margin-top:6px;padding-left:16px;font-size:12px;color:var(--txd);line-height:1.5;">${whyLis}</ul>
    <div style="margin-top:16px;font-weight:800;font-size:13px;">✈️ Flights from the US</div>
    <div style="margin-top:6px;">${flightRows}</div>
    <div style="margin-top:16px;font-weight:800;font-size:13px;">🛂 Visa — US Passport</div>
    <div class="grid2" style="margin-top:6px;font-size:12px;">
      <div><b>${d.visa.type}</b><div style="color:var(--txm);">Type</div></div>
      <div><b>${d.visa.cost}</b><div style="color:var(--txm);">Cost</div></div>
      <div><b>${d.visa.processing}</b><div style="color:var(--txm);">Processing</div></div>
      <div><b>${d.visa.duration}</b><div style="color:var(--txm);">Duration</div></div>
    </div>
    <div style="margin-top:8px;font-size:12px;"><b>Documents:</b><ul style="padding-left:16px;margin-top:3px;color:var(--txd);">${docLis}</ul></div>
    <div style="margin-top:8px;background:var(--tag-lt);border-radius:8px;padding:9px 11px;font-size:11.5px;color:var(--tag-dk);">💡 ${d.visa.note}</div>
    <div style="margin-top:16px;font-weight:800;font-size:13px;">ℹ️ Practical Info</div>
    <div style="margin-top:6px;font-size:12px;color:var(--txd);display:grid;gap:6px;">
      <div><b>💱</b> ${prac.currency}</div><div><b>🏥</b> ${prac.health}</div><div><b>🔌</b> ${prac.electricity}</div>
      <div><b>📱</b> ${prac.internet}</div><div><b>💰</b> ${prac.tipping}</div><div><b>🚨</b> ${prac.emergency}</div>
    </div>
  </div>`;
  document.getElementById('dest-detail').scrollIntoView({behavior:'smooth'});
}
